spring:
  application:
    name: medical-authorizations
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=db_medical_authorizations;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:api_user_medauth}
    password: ${DB_PASSWORD:ApiUserMedAuth123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:300000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  health:
    db:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: db,ping
        liveness:
          include: livenessState,ping
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  pattern:
    level: "%5p [corrId=%X{correlationId}]"

app:
  persistence:
    default-query-timeout-seconds: ${DB_QUERY_TIMEOUT_SECONDS:30}
  messaging:
    rabbit:
      enabled: ${RABBITMQ_ENABLED:true}
      exchange: ${RABBITMQ_EXCHANGE:medical.authorization.exchange}
      authorization-created-routing-key: ${RABBITMQ_AUTH_CREATED_KEY:authorization.created}
      authorization-created-queue: ${RABBITMQ_AUTH_CREATED_QUEUE:authorization.created.processing}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
