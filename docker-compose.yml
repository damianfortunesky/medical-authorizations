version: "3.9"

services:
  app:
    build: .
    image: medical-authorizations:local
    depends_on:
      - rabbitmq
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=medical_authorizations;encrypt=true;trustServerCertificate=true
      DB_USERNAME: api_user_medauth
      DB_PASSWORD: ApiUserMedAuth123!
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
